services:
  - type: web
    name: fake-job-detector-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: ENABLE_DB_LOGGING
        value: "false"

  - type: web
    name: fake-job-detector-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m streamlit run app.py --server.port 10000 --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: API_BASE_URL
        fromService:
          name: fake-job-detector-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
